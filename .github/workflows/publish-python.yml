name: Publish Python client to PyPI

on:
  push:
    tags:
      - 'python-v*'

jobs:
  # Pure-Python sdist — used as fallback when no pre-built wheel matches.
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist clientPython/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: clientPython/dist/*.tar.gz

  # Pre-compiled manylinux wheels for the architectures Home Assistant runs on:
  #   x86_64  — NUC / generic x86 VM / Docker desktop
  #   aarch64 — Raspberry Pi 4 / 5 (64-bit HAOS), most modern ARM boards
  #   armv7l  — Raspberry Pi 3 and older (32-bit HAOS)
  wheels:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64, armv7l]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch emulation)
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels (${{ matrix.arch }})
        uses: pypa/cibuildwheel@v2
        with:
          package-dir: clientPython/
          output-dir: dist/
        env:
          # Only CPython 3.13, manylinux (glibc ≥ 2.17 — all current HAOS versions).
          CIBW_BUILD: "cp313-manylinux*"
          CIBW_ARCHS: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: dist/*.whl

  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
